apiVersion: v1
kind: Pod
metadata:
  name: oom-victim
  labels:
    scenario: "02-oomkilled"
    app: oom-victim
spec:
  containers:
    - name: memory-hog
      image: polinux/stress
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "50M", "--timeout", "60s"]
      resources:
        requests:
          memory: "10Mi"
          cpu: "50m"
        limits:
          memory: "10Mi"   # intentionally too low — will OOMKill
          cpu: "200m"
  restartPolicy: Always
