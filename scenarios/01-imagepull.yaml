apiVersion: v1
kind: Pod
metadata:
  name: imagepull-fail
  labels:
    scenario: "01-imagepull"
    app: imagepull-fail
spec:
  containers:
    - name: app
      image: nginx:does-not-exist-v999
      resources:
        requests:
          memory: "32Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"
          cpu: "100m"
  restartPolicy: Never
